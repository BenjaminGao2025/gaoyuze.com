baseURL: "https://gaoyuze.com/"
languageCode: "zh-cn"
title: "Gao Yuze"
theme: "PaperMod"

# 构建配置
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# 分页
pagination:
  pagerSize: 10

# 菜单
# 菜单
menu:
  main:
    - identifier: engineering
      name: 工程
      url: /engineering/
      weight: 10
    - identifier: investing
      name: 投资
      url: /investing/
      weight: 20
    - identifier: life
      name: 生活
      url: /life/
      weight: 30
    - identifier: projects
      name: 项目
      url: /projects/
      weight: 40
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 50
    - identifier: search
      name: 搜索
      url: /search/
      weight: 60
    - identifier: about
      name: 关于
      url: /about/
      weight: 70

# PaperMod 主题配置
params:
  env: production
  title: Gao Yuze
  description: "个人博客 - 记录技术与生活"
  keywords: [Blog, Portfolio, Personal]
  author: Gao Yuze
  
  defaultTheme: auto  # 跟随系统深色/浅色模式
  disableThemeToggle: false
  
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # 首页个人简介卡片设置 (Profile Mode)
  profileMode:
    enabled: true
    title: "Gao Yuze"
    subtitle: "CS Master Student @ FDU | Value Investor | Ex-Entrepreneur"
    imageUrl: "https://github.com/BenjaminGao2025.png"
    imageTitle: "Gao Yuze"
    imageWidth: 150
    imageHeight: 150
    buttons:
      - name: "Blog"
        url: "posts"
      - name: "About"
        url: "about"

  # 社交链接
  socialIcons:
    - name: "github"
      url: "https://github.com/BenjaminGao2025"
    - name: "email"
      url: "mailto:nothingcoder2025@gmail.com"

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# Markdown 渲染配置
markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON
